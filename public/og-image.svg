<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Andrii Shupta — Full-stack engineer</title>
  <desc id="description">A monochrome social preview for Andrii Shupta, a full-stack engineer building secure, production-ready software.</desc>
  <rect width="1200" height="630" fill="#ffffff" />
  <rect width="620" height="630" fill="#080808" />

  <g fill="#ffffff" font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="235" font-size="96" font-weight="700" letter-spacing="-4">Andrii</text>
    <text x="72" y="330" font-size="96" font-weight="700" letter-spacing="-4">Shupta</text>
    <text x="72" y="556" font-size="22" font-weight="600">andriishupta.dev</text>
  </g>

  <g fill="#080808" font-family="Arial, Helvetica, sans-serif">
    <text x="700" y="178" font-size="50" font-weight="700" letter-spacing="-1.5">Full-stack</text>
    <text x="700" y="236" font-size="50" font-weight="700" letter-spacing="-1.5">engineer</text>
    <text x="700" y="288" font-size="24" font-weight="600">10+ years of experience</text>
    <line x1="700" y1="348" x2="1128" y2="348" stroke="#080808" stroke-width="2" />
    <text x="700" y="410" font-size="29" font-weight="500">Secure, maintainable systems</text>
    <text x="700" y="450" font-size="29" font-weight="500">with AI-assisted delivery.</text>
