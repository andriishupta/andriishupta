<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  role="img"
  aria-labelledby="favicon-title"
  shape-rendering="geometricPrecision"
>
  <title id="favicon-title">Andrii Shupta</title>

  <defs>
    <clipPath id="left-half">
      <rect width="64" height="128" />
    </clipPath>
    <clipPath id="right-half">
      <rect x="64" width="64" height="128" />
    </clipPath>
    <path
      id="a-mark"
      fill-rule="evenodd"
      d="M27 100 52.5 27h23L101 100H80.5l-4.8-15H52.3l-4.8 15H27Zm31-35h12L64 44.5 58 65Z"
    />
  </defs>

  <style>
    .surface { fill: #080808; }
    .left-mark { fill: #f7f7f7; }
    .right-mark { fill: #a3a3a3; }
    .micro-mark { display: none; fill: #f7f7f7; }

    @media (prefers-color-scheme: dark) {
      .surface { fill: #f7f7f7; }
      .left-mark { fill: #080808; }
      .right-mark { fill: #5f5f5f; }
      .micro-mark { fill: #080808; }
    }

    @media (max-width: 20px), (max-height: 20px) {
      .mark-detail { display: none; }
      .micro-mark { display: block; }
    }
  </style>

  <rect
    class="surface"
    x="4"
    y="4"
    width="120"
    height="120"
    rx="26"
  />

  <use class="left-mark mark-detail" href="#a-mark" clip-path="url(#left-half)" />
  <use class="right-mark mark-detail" href="#a-mark" clip-path="url(#right-half)" />
  <use class="micro-mark" href="#a-mark" />
</svg>
